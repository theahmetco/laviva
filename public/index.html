<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Laviva - Çoklu Oda Chat</title>
  <style>
    :root {
      --accent: #7c3aed; --accent-dark: #6d28d9;
      --accent-light: #a78bfa; --accent-bubble: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f; color: #e0e0e0;
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    header, #lobby-screen, #connecting-screen, #chat-screen, #closed-screen {
      position: relative; z-index: 1;
    }

    header {
      padding: 12px 16px; background: rgba(23,23,31,0.85);
      backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.2rem; color: #fff; }
    .brand span { background: linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .room-badge {
      font-size: 0.8rem; background: rgba(124, 58, 237, 0.2); border: 1px solid var(--accent);
      padding: 4px 8px; border-radius: 12px; color: var(--accent-light); font-weight: 600;
    }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
    .status-dot.green { background: #10b981; box-shadow: 0 0 8px #10b981; }
    .status-dot.orange { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    .status-dot.red { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

    main { flex: 1; display: flex; flex-direction: column; position: relative; }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .screen.active { opacity: 1; pointer-events: auto; }

    .card {
      background: rgba(18,18,26,0.75); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08); padding: 32px;
      border-radius: 24px; width: 100%; max-width: 400px; text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .card h2 { margin-bottom: 8px; font-size: 1.6rem; color: #fff; }
    .card p { color: #9ca3af; font-size: 0.95rem; margin-bottom: 24px; }

    .input-group { position: relative; width: 100%; margin-bottom: 16px; }
    .input-group input {
      width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      color: #fff; font-size: 1rem; outline: none; transition: all 0.2s;
    }
    .input-group input:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }

    .btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
    .btn:active { transform: translateY(1px); }

    #chat-screen { justify-content: flex-start; padding: 0; }
    .chat-header {
      width: 100%; padding: 10px 16px; background: rgba(15,15,22,0.6);
      border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; color: #9ca3af;
    }

        .chat-messages { flex: 1; width: 100%; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
    
    .msg-row { display: flex; flex-direction: column; width: 100%; max-width: 80%; }
    .msg-row.me { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }
    
    .msg-nick { font-size: 0.75rem; color: #9ca3af; margin: 4px 8px 2px 8px; font-weight: 500; }
    
    .msg-bubble {
      padding: 10px 14px; border-radius: 18px; position: relative; font-size: 0.95rem; line-height: 1.4;
      word-break: break-word; color: #fff; transition: all 0.2s;
    }
    .msg-row.me .msg-bubble { background: var(--accent-bubble); border-bottom-right-radius: 4px; }
    .msg-row.other .msg-bubble { background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
    
    .msg-row.me.same-group .msg-bubble { border-bottom-right-radius: 18px; }
    .msg-row.other.same-group .msg-bubble { border-bottom-left-radius: 18px; }
    
    .msg-time { font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-top: 4px; text-align: right; display: block; }
    
    .sys-msg { align-self: center; text-align: center; font-size: 0.75rem; color: #6b7280; padding: 4px 12px; background: rgba(255,255,255,0.02); border-radius: 10px; margin: 4px 0; border: 1px solid rgba(255,255,255,0.03); }
    .sys-msg.join { color: #10b981; background: rgba(16,185,129,0.04); }
    .sys-msg.leave { color: #ef4444; background: rgba(239,68,68,0.04); }

    .chat-footer { width: 100%; padding: 12px; background: rgba(15,15,22,0.85); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; gap: 8px; }
    .input-row { display: flex; align-items: center; gap: 8px; width: 100%; }
    
    .chat-input-wrapper { flex: 1; position: relative; display: flex; align-items: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 2px 4px 2px 12px; }
    .chat-input-wrapper input { flex: 1; background: none; border: none; padding: 10px 0; color: #fff; font-size: 0.95rem; outline: none; }
    
    .circle-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: #a78bfa; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .circle-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .circle-btn.primary { background: var(--accent); color: #fff; }
    .circle-btn.primary:hover { background: var(--accent-dark); }

    .typing-indicator { font-size: 0.8rem; color: #9ca3af; padding-left: 8px; min-height: 18px; font-style: italic; }

    .spinner { width: 40px; height: 40px; border: 3px solid rgba(124,58,237,0.1); border-radius: 50%; border-top-color: var(--accent); animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <header>
    <div class="brand"><span>LAVIVA</span></div>
    <div id="room-display" class="room-badge">Oda: Genel</div>
    <div id="status-dot" class="status-dot"></div>
  </header>

  <main>
    <div id="lobby-screen" class="screen active">
      <div class="card">
        <h2>Sohbete Katıl</h2>
        <p>Devam etmek için bir takma ad belirleyin.</p>
        <div class="input-group">
          <input type="text" id="nick-input" placeholder="Takma adınız..." maxlength="30" autocomplete="off" />
        </div>
        <button id="join-btn" class="btn">Giriş Yap</button>
      </div>
    </div>

    <div id="connecting-screen" class="screen">
      <div class="spinner"></div>
      <p style="color: #9ca3af;">Sunucuya bağlanılıyor...</p>
    </div>

    <div id="chat-screen" class="screen">
      <div class="chat-header">
        <span id="online-count">0 Kişi Çevrimiçi</span>
        <span id="clock-display">00:00</span>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-footer">
        <div id="typing-indicator" class="typing-indicator"></div>
        <div class="input-row">
          <div class="chat-input-wrapper">
            <input type="text" id="msg-input" placeholder="Mesajınızı yazın..." maxlength="500" autocomplete="off" />
          </div>
          <button id="send-btn" class="circle-btn primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="closed-screen" class="screen">
      <div class="card">
        <h2 style="color:#ef4444;">Süre Doldu</h2>
        <p>Bu uygulamanın kullanım süresi sona ermiştir.</p>
      </div>
    </div>
  </main>

    <script>
    // URL'den dinamik oda kodunu yakala (Örn: /123 -> "123"). Boşsa "Genel" yap.
    const currentRoom = window.location.pathname.split('/')[1] || 'default';
    document.getElementById('room-display').innerText = 'Oda: ' + (currentRoom === 'default' ? 'Genel' : currentRoom);

    const NICK_KEY = 'laviva_nick';
    let ws = null, nick = '', isClosed = false, lastMsgNick = '', lastMsgTime = 0, typingClearTimeout = null;

    // DOM Elementleri
    const dot = document.getElementById('status-dot');
    const lobbyScreen = document.getElementById('lobby-screen');
    const connScreen = document.getElementById('connecting-screen');
    const chatScreen = document.getElementById('chat-screen');
    const closedScreen = document.getElementById('closed-screen');
    const nickInput = document.getElementById('nick-input');
    const joinBtn = document.getElementById('join-btn');
    const chatMessages = document.getElementById('chat-messages');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const onlineCount = document.getElementById('online-count');
    const typingIndicator = document.getElementById('typing-indicator');
    const clockDisplay = document.getElementById('clock-display');

    // ARKA PLAN ANIMASYONU (Canvas)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    class Particle {
      constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.5; this.speedY = Math.random() * -0.3 - 0.1; this.opacity = Math.random() * 0.5 + 0.2; }
      update() { this.y += this.speedY; if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; } }
      draw() { ctx.fillStyle = `rgba(167, 139, 250, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    for (let i = 0; i < 40; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();

    // Zaman ve Durum Ayarları
    setInterval(() => { const d = new Date(); clockDisplay.innerText = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }, 1000);
    function setStatus(c) { dot.className = 'status-dot ' + c; }
    function showScreen(s) { [lobbyScreen, connScreen, chatScreen, closedScreen].forEach(e => e.classList.remove('active')); s.classList.add('active'); }

    // Kayıtlı Nick Varsa Doldur
    const savedNick = localStorage.getItem(NICK_KEY);
    if (savedNick) nickInput.value = savedNick;

    // WEBSOCKET BAĞLANTISI
    function connectChat() {
      if (ws) return;
      setStatus('orange');
      showScreen(connScreen);

      const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      // Sunucuya hangi odada olduğumuzu query parametresiyle bildiriyoruz
      ws = new WebSocket(protocol + window.location.host + '?room=' + encodeURIComponent(currentRoom));

      ws.onopen = () => {
        setStatus('green');
        showScreen(chatScreen);
        ws.send(JSON.stringify({ type: 'join', nick }));
      };

      ws.onmessage = (e) => {
        let msg; try { msg = JSON.parse(e.data); } catch(err) { return; }

        if (msg.type === 'system') {
          if (msg.text.includes('Süre dolmuştur')) { isClosed = true; showScreen(closedScreen); setStatus('red'); return; }
          const div = document.createElement('div'); div.className = 'sys-msg ' + (msg.kind || ''); div.innerText = msg.text;
          chatMessages.appendChild(div); scrollBottom();
        }
        
        if (msg.type === 'online') onlineCount.innerText = msg.count + ' Kişi Çevrimiçi';
        
        if (msg.type === 'typing') {
          typingIndicator.innerText = msg.nick + ' yazıyor...';
          clearTimeout(typingClearTimeout); typingClearTimeout = setTimeout(() => { typingIndicator.innerText = ''; }, 2000);
        }
        
        if (msg.type === 'history') { chatMessages.innerHTML = ''; msg.messages.forEach(appendMessage); scrollBottom(); }
        if (msg.type === 'message') { appendMessage(msg.message); scrollBottom(); }
        if (msg.type === 'delete') { const el = document.getElementById('msg_' + msg.id); if (el) { el.querySelector('.msg-bubble').innerText = 'Bu mesaj silindi.'; el.querySelector('.msg-bubble').style.fontStyle = 'italic'; el.querySelector('.msg-bubble').style.opacity = '0.5'; } }
      };

      ws.onclose = () => { setStatus('red'); ws = null; if (!isClosed) setTimeout(connectChat, 3000); };
    }

    function appendMessage(m) {
      const isMe = m.nick === nick;
      const mTime = new Date(m.time).getTime();
      const sameUser = (lastMsgNick === m.nick) && (mTime - lastMsgTime < 60000);
      
      const row = document.createElement('div');
      row.id = 'msg_' + m.id;
      row.className = `msg-row ${isMe ? 'me' : 'other'} ${sameUser ? 'same-group' : ''}`;

      if (!sameUser && !isMe) {
        const nDiv = document.createElement('div'); nDiv.className = 'msg-nick'; nDiv.innerText = m.nick;
        chatMessages.appendChild(nDiv);
      }

      const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
      
      if (m.deleted) {
        bubble.innerText = 'Bu mesaj silindi.'; bubble.style.fontStyle = 'italic'; bubble.style.opacity = '0.5';
      } else {
        bubble.innerText = m.text;
        if (isMe) {
          bubble.style.cursor = 'pointer';
          bubble.onclick = () => { if (confirm('Bu mesajı silmek istiyor musunuz?')) ws.send(JSON.stringify({ type: 'delete', id: m.id, nick })); };
        }
      }

      const timeSpan = document.createElement('span'); timeSpan.className = 'msg-time';
      const d = new Date(m.time); timeSpan.innerText = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      
      bubble.appendChild(timeSpan); row.appendChild(bubble); chatMessages.appendChild(row);
      lastMsgNick = m.nick; lastMsgTime = mTime;
    }

    function scrollBottom() { setTimeout(() => { chatMessages.scrollTop = chatMessages.scrollHeight; }, 50); }

    function enterChat() {
      const n = nickInput.value.trim(); if (!n) return;
      nick = n; localStorage.setItem(NICK_KEY, nick);
      connectChat();
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'chat', nick, text }));
      msgInput.value = ''; msgInput.focus();
    }

    msgInput.addEventListener('input', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'typing', nick }));
    });

    joinBtn.addEventListener('click', enterChat);
    nickInput.addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>

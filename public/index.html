<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Laviva</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 12px 16px;
      background: #17171f;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; color: #a78bfa; letter-spacing: 1px; }
    #header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #online-count { font-size: 0.8rem; color: #a78bfa; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e; display: inline-block;
      transition: background 0.3s;
    }
    #status-dot.yellow { background: #eab308; animation: blink 0.6s infinite; }
    #status-dot.red { background: #ef4444; animation: none; }
    #status-dot.green { background: #22c55e; animation: none; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    #online-list { font-size: 0.75rem; color: #6b7280; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #nick-screen {
      flex: 1; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 16px; padding: 20px;
    }
    #nick-screen h2 { font-size: 1rem; color: #9ca3af; font-weight: 400; }
    #nick-input, #msg-input {
      -webkit-appearance: none; appearance: none;
      border: 1px solid #3a3a50; background: #1e1e2e;
      color: #fff; font-size: 1rem; outline: none;
      -webkit-user-select: text; user-select: text;
    }
    #nick-input { padding: 12px 18px; border-radius: 10px; width: 100%; max-width: 300px; }
    #nick-btn {
      padding: 12px 32px; border-radius: 10px; border: none;
      background: #7c3aed; color: #fff; font-size: 1rem;
      cursor: pointer; width: 100%; max-width: 300px; -webkit-appearance: none;
    }

    #chat-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 80%; position: relative; }
    .msg.mine { align-self: flex-end; align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg-nick { font-size: 0.7rem; color: #6b7280; padding: 0 4px; }
    .msg.mine .msg-nick { color: #a78bfa; }
    .msg-bubble {
      padding: 9px 14px; border-radius: 16px;
      font-size: 0.93rem; line-height: 1.5; word-break: break-word;
    }
    .msg.mine .msg-bubble { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .msg.other .msg-bubble { background: #1e1e2e; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 0.65rem; color: #4b5563; padding: 0 4px; }
    .delete-btn {
      display: none; position: absolute; top: -8px; right: -8px;
      background: #ef4444; border: none; color: white;
      border-radius: 50%; width: 22px; height: 22px;
      font-size: 0.7rem; cursor: pointer;
      align-items: center; justify-content: center; z-index: 10;
    }
    .msg.mine.show-delete .delete-btn { display: flex; }
    .deleted-text { font-style: italic; color: #6b7280 !important; font-size: 0.85rem; }
    .system-msg {
      text-align: center; font-size: 0.75rem; color: #4b5563;
      padding: 4px 12px; background: #1a1a24; border-radius: 12px;
      align-self: center;
    }

    #input-area {
      padding: 10px 12px; background: #17171f;
      border-top: 1px solid #2a2a3a; display: flex; gap: 8px; align-items: center;
      flex-shrink: 0;
    }
    #msg-input { flex: 1; padding: 11px 16px; border-radius: 24px; }
    #send-btn {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: #7c3aed; color: #fff; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; -webkit-appearance: none;
    }
  </style>
</head>
<body>
<header>
  <h1>laviva</h1>
  <div id="header-right">
    <span id="online-count">
      <span id="status-dot" class="yellow"></span>
      <span id="online-num">0</span>
    </span>
    <span id="online-list"></span>
  </div>
</header>

<div id="nick-screen">
  <h2>Takma adını gir</h2>
  <input id="nick-input" type="text" placeholder="nick..." maxlength="30" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
  <button id="nick-btn">Giriş Yap</button>
</div>

<div id="chat-screen">
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Mesaj yaz..." maxlength="500" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  const NICK_KEY = 'laviva_nick';
  let nick = localStorage.getItem(NICK_KEY) || '';
  let ws;

  const nickScreen = document.getElementById('nick-screen');
  const chatScreen = document.getElementById('chat-screen');
  const nickInput = document.getElementById('nick-input');
  const nickBtn = document.getElementById('nick-btn');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const onlineNum = document.getElementById('online-num');
  const onlineList = document.getElementById('online-list');
  const statusDot = document.getElementById('status-dot');

  function setStatus(s) {
    statusDot.className = s;
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(msg, isMine) {
    const div = document.createElement('div');
    div.className = 'msg ' + (isMine ? 'mine' : 'other');
    div.dataset.id = msg.id;

    if (msg.deleted) {
      div.innerHTML = `
        <span class="msg-nick">${escapeHtml(msg.nick)}</span>
        <div class="msg-bubble deleted-text">Bu mesaj silindi</div>
        <span class="msg-time">${formatTime(msg.time)}</span>
      `;
    } else {
      div.innerHTML = `
        <span class="msg-nick">${escapeHtml(msg.nick)}</span>
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
        <span class="msg-time">${formatTime(msg.time)}</span>
        ${isMine ? `<button class="delete-btn">✕</button>` : ''}
      `;
      if (isMine) {
        div.addEventListener('click', function(e) {
          if (e.target.classList.contains('delete-btn')) {
            ws.send(JSON.stringify({ type: 'delete', id: msg.id, nick }));
            return;
          }
          document.querySelectorAll('.msg.mine').forEach(m => m.classList.remove('show-delete'));
          div.classList.toggle('show-delete');
        });
      }
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function connect() {
    setStatus('yellow');
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      setStatus('green');
      ws.send(JSON.stringify({ type: 'join', nick }));
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'history') {
        messagesEl.innerHTML = '';
        data.messages.forEach(msg => addMessage(msg, msg.nick === nick));
      } else if (data.type === 'message') {
        addMessage(data.message, data.message.nick === nick);
      } else if (data.type === 'deleted') {
        const el = document.querySelector(`[data-id="${data.id}"]`);
        if (el) {
          const n = el.querySelector('.msg-nick').textContent;
          const t = el.querySelector('.msg-time').textContent;
          el.innerHTML = `
            <span class="msg-nick">${escapeHtml(n)}</span>
            <div class="msg-bubble deleted-text">Bu mesaj silindi</div>
            <span class="msg-time">${t}</span>
          `;
          el.classList.remove('show-delete');
        }
      } else if (data.type === 'online') {
        onlineNum.textContent = data.count;
        onlineList.textContent = data.users.join(', ');
      } else if (data.type === 'system') {
        addSystemMsg(data.text);
      }
    };

    ws.onclose = () => {
      setStatus('red');
      setTimeout(connect, 2000);
    };
  }

  function enterChat() {
    const n = nickInput.value.trim();
    if (!n) return;
    nick = n;
    localStorage.setItem(NICK_KEY, nick);
    showChat();
  }

  function showChat() {
    nickScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    setTimeout(() => msgInput.focus(), 100);
    connect();
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'chat', nick, text }));
    msgInput.value = '';
  }

  nickBtn.addEventListener('click', enterChat);
  nickInput.addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // Nick varsa direkt chat'e gir
  if (nick) {
    showChat();
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laviva</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      background: #17171f;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; color: #a78bfa; letter-spacing: 1px; }
    #header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    #online-count { font-size: 0.8rem; color: #a78bfa; font-weight: 600; }
    #online-list { font-size: 0.75rem; color: #6b7280; }

    #nick-screen {
      flex: 1; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 16px; padding: 20px;
    }
    #nick-screen h2 { font-size: 1rem; color: #9ca3af; font-weight: 400; }
    #nick-input {
      padding: 12px 18px; border-radius: 10px; border: 1px solid #3a3a50;
      background: #1e1e2e; color: #fff; font-size: 1rem;
      width: 100%; max-width: 300px; outline: none;
    }
    #nick-btn {
      padding: 12px 32px; border-radius: 10px; border: none;
      background: #7c3aed; color: #fff; font-size: 1rem;
      cursor: pointer; width: 100%; max-width: 300px;
    }

    #chat-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 80%; position: relative; }
    .msg.mine { align-self: flex-end; align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg-nick { font-size: 0.7rem; color: #6b7280; padding: 0 4px; }
    .msg.mine .msg-nick { color: #a78bfa; }
    .msg-bubble {
      padding: 9px 14px; border-radius: 16px;
      font-size: 0.93rem; line-height: 1.5; word-break: break-word;
    }
    .msg.mine .msg-bubble { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .msg.other .msg-bubble { background: #1e1e2e; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 0.65rem; color: #4b5563; padding: 0 4px; }
    .msg.mine .msg-bubble:active { opacity: 0.7; }
    .delete-btn {
      display: none; position: absolute; top: -8px; right: -8px;
      background: #ef4444; border: none; color: white;
      border-radius: 50%; width: 20px; height: 20px;
      font-size: 0.7rem; cursor: pointer; align-items: center; justify-content: center;
    }
    .msg.mine:hover .delete-btn { display: flex; }

    #input-area {
      padding: 12px 16px; background: #17171f;
      border-top: 1px solid #2a2a3a; display: flex; gap: 10px; align-items: center;
    }
    #msg-input {
      flex: 1; padding: 11px 16px; border-radius: 24px;
      border: 1px solid #3a3a50; background: #1e1e2e;
      color: #fff; font-size: 0.95rem; outline: none;
    }
    #send-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: #7c3aed; color: #fff; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px; }
  </style>
</head>
<body>
<header>
  <h1>laviva</h1>
  <div id="header-right">
    <span id="online-count">🟢 0</span>
    <span id="online-list"></span>
  </div>
</header>

<div id="nick-screen">
  <h2>Takma adını gir</h2>
  <input id="nick-input" type="text" placeholder="nick..." maxlength="30" autocomplete="off" />
  <button id="nick-btn">Giriş Yap</button>
</div>

<div id="chat-screen">
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Mesaj yaz..." maxlength="500" autocomplete="off" />
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  let nick = '';
  let ws;

  const nickScreen = document.getElementById('nick-screen');
  const chatScreen = document.getElementById('chat-screen');
  const nickInput = document.getElementById('nick-input');
  const nickBtn = document.getElementById('nick-btn');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const onlineCount = document.getElementById('online-count');
  const onlineList = document.getElementById('online-list');

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addMessage(msg, isMine) {
    const div = document.createElement('div');
    div.className = 'msg ' + (isMine ? 'mine' : 'other');
    div.dataset.id = msg.id;
    div.innerHTML = `
      <span class="msg-nick">${escapeHtml(msg.nick)}</span>
      <div class="msg-bubble">${escapeHtml(msg.text)}</div>
      <span class="msg-time">${formatTime(msg.time)}</span>
      ${isMine ? `<button class="delete-btn" onclick="deleteMsg('${msg.id}')">✕</button>` : ''}
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function deleteMsg(id) {
    ws.send(JSON.stringify({ type: 'delete', id }));
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'join', nick }));
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'history') {
        messagesEl.innerHTML = '';
        data.messages.forEach(msg => addMessage(msg, msg.nick === nick));
      } else if (data.type === 'message') {
        addMessage(data.message, data.message.nick === nick);
      } else if (data.type === 'delete') {
        const el = document.querySelector(`[data-id="${data.id}"]`);
        if (el) el.remove();
      } else if (data.type === 'online') {
        onlineCount.textContent = '🟢 ' + data.users.length;
        onlineList.textContent = data.users.join(', ');
      }
    };

    ws.onclose = () => setTimeout(connect, 2000);
  }

  function enterChat() {
    const n = nickInput.value.trim();
    if (!n) return;
    nick = n;
    nickScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    msgInput.focus();
    connect();
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'chat', nick, text }));
    msgInput.value = '';
  }

  nickBtn.onclick = enterChat;
  nickInput.onkeydown = e => e.key === 'Enter' && enterChat();
  sendBtn.onclick = sendMessage;
  msgInput.onkeydown = e => e.key === 'Enter' && sendMessage();
</script>
</body>
</html>
